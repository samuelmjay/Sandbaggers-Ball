<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1ec;
      --surface: #ffffff;
      --ink: #1a1a18;
      --ink-muted: #6b6b67;
      --accent: #c84b2f;
      --border: #e0dbd3;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 3rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      background: var(--bg);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    header span {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--accent);
      border-radius: 2px;
    }

    main {
      flex: 1;
      padding: 2rem 3rem;
    }

    .embed-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    iframe {
      display: block;
      width: 100%;
      height: 80vh;
      min-height: 500px;
      border: none;
    }

    footer {
      padding: 1.25rem 3rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--ink-muted);
      letter-spacing: 0.03em;
    }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 1.25rem; padding-right: 1.25rem; }
      header { flex-direction: column; gap: 0.75rem; }
      iframe { height: 70vh; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Dashboard</h1>
    <span>Live Data</span>
  </header>

  <main>
    <div class="embed-wrapper">
      <iframe
        src="https://lookerstudio.google.com/embed/reporting/c31a80ca-fd1a-42bb-89fd-a0ca26eed770/page/bRvkF"
        allowfullscreen
        sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
      </iframe>
    </div>
  </main>

  <footer>
    Data sourced via Looker Studio &mdash; refreshes automatically
  </footer>

</body>
</html>
